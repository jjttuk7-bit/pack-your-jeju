# Railway 배포 설정. 서비스가 이 파일을 자동 인식.
# 참고: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand는 Dockerfile CMD에 위임 (sh -c로 ${PORT} 확장 처리됨).
# Railway startCommand는 exec 파싱이라 ${PORT:-8000}가 리터럴로 전달되는 문제 회피.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
